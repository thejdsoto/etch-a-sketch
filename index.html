<!DOCTYPE html>
<head>
    <title>ETCH A SKETCH</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>ETCH A SKETCH</h1>
    </div>
    <div class="container">
        <div class="left">
            <div class="palette">
                <div class="left">
                    <button type="button" class="color" id="black"></button>
                    <button type="button" class="color" id="red"></button>
                    <button type="button" class="color" id="yellow"></button>
                    <button type="button" class="color" id="green"></button>
                    <button type="button" class="color" id="cyan"></button>
                </div>
                <div class="right">
                    <button type="button" class="color" id="blue"></button>
                    <button type="button" class="color" id="magenta"></button>
                    <button type="button" class="color" id="lavender"></button>
                    <button type="button" class="color" id="gray"></button>
                    <button type="button" class="color" id="purple"></button>
                </div>
            </div>
        </div>
        <div class="canvas">
        </div>
        <!--<div class="right">
            <button type="button" class="button-right">Eraser</button>
            <button type="button" class="button-right">Clear All</button>
        </div>-->
    </div>
    <footer>
        <p>Made by John David Soto</p>
    </footer>
</body>
